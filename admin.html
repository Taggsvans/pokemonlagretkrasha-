<!-- admin.html -->
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="favicon.png">
<title>Admin EKEM CARDS</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="js/firebase.js"></script>
<script src="js/cart.js"></script>
<script src="js/shop.js"></script>
<script src="js/admin.js"></script>
<script src="js/orders.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

<link rel="stylesheet" href="base.css">
<link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="container">

<div class="admin-header">
  <h2>Admin Panel</h2>
  <button class="logout-btn" onclick="logout()">Logga ut</button>
</div>

<div id="loginBox" class="panel">
  <input id="pass" type="password" placeholder="Lösenord">
  <button onclick="login()">Logga in</button>
</div>

<div id="adminPanel" style="display:none;">

  <div class="admin-nav">
    <button onclick="showTab('add')">➕ Lägg till</button>
    <button onclick="showTab('manage')">🔍 Hantera</button>
    <button onclick="showTab('orders')">📦 Ordrar</button>
  </div>

  <!-- ADD -->
  <div id="tab-add" class="panel tab">
    <h3>Lägg till kort</h3>

    <input id="name" placeholder="Namn">
    <input id="price" type="number" placeholder="Pris">
    <input id="description" placeholder="Produktbeskrivning">
    <input id="stock" type="number" placeholder="Antal i lager">
    <input type="file" id="imageInput">

<h4>Kategori</h4>

<div class="category-row">
  <input type="checkbox" id="catPokemon">
  <label for="catPokemon">Pokémon</label>
</div>

<div class="category-row">
  <input type="checkbox" id="catOnePiece">
  <label for="catOnePiece">One Piece</label>
</div>

<div class="category-row">
  <input type="checkbox" id="catBooster">
  <label for="catBooster">Booster Pack</label>
</div>

<div class="category-row">
  <input type="checkbox" id="catSingel">
  <label for="catSingel">Singlar</label>
</div>
    <button onclick="addCard()">Lägg till</button>
  </div>

  <!-- MANAGE -->
  <div id="tab-manage" class="panel tab" style="display:none;">
    <h3>Hantera kort</h3>
    <input id="adminSearch" placeholder="Sök...">
    <div id="adminCards"></div>
  </div>

  <!-- ORDERS -->
  <div id="tab-orders" class="panel tab" style="display:none;">
    <h3>Orders</h3>
    <button onclick="markAsShipped()">📦 Markera som skickad</button>
    <div id="orders"></div>
  </div>

</div>
</div>

<div id="imgModal" class="img-modal" onclick="closeImageModal()">
  <img id="imgModalContent">
</div>

</body>
</html>
